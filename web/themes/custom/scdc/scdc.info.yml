name: SCDC
type: theme
description: 'Custom theme for South Cambridgeshire District Council built on LocalGov Drupal using the 7-1 SASS architecture.'
core_version_requirement: ^10.3 || ^11
base theme: localgov_base
package: Custom

regions:
  tabs: Tabs
  header: Header
  search: Search
  mobile_search: 'Mobile search'
  primary_menu: 'Primary menu'
  secondary_menu: 'Secondary menu'
  subsites_menu: 'Subsites menu'
  banner: Banner
  breadcrumb: Breadcrumb
  messages: Messages
  content_top: 'Content top'
  content: Content
  content_bottom: 'Content bottom'
  sidebar_first: 'Sidebar first'
  sidebar_second: 'Sidebar second'
  footer_first: 'Footer first'
  footer_second: 'Footer second'
  footer_third: 'Footer third'
  footer: Footer
  lower_footer_first: 'Lower footer first'
  lower_footer_second: 'Lower footer second'
  lower_footer_third: 'Lower footer third'
  housekeeping: Housekeeping
  disabled: Disabled

libraries:
  - scdc/global-styling
  - scdc/global-scripts

component-libraries:
  scdc:
    paths:
      - templates
