localgov_localisation.settings:
  type: config_object
  label: 'LocalGov Localisation settings'
  mapping:
    api_base_url:
      type: string
      label: 'API Base URL'
    api_key:
      type: string
      label: 'API Key'
    api_version:
      type: string
      label: 'API Version'
    auth_method:
      type: string
      label: 'Authentication method'
    entra_tenant_id:
      type: string
      label: 'Entra ID Tenant ID'
    entra_client_id:
      type: string
      label: 'Entra ID Client ID'
    entra_client_secret:
      type: string
      label: 'Entra ID Client Secret'
    entra_scope:
      type: string
      label: 'Entra ID OAuth2 Scope'
    address_source:
      type: string
      label: 'Address data source'
    authority_source:
      type: string
      label: 'Authority source'
    cache_lifetime:
      type: integer
      label: 'Cache lifetime in seconds'
    default_radius_events:
      type: float
      label: 'Default events search radius'
    default_radius_planning:
      type: float
      label: 'Default planning search radius'
    enabled_services:
      type: mapping
      label: 'Enabled services'
      mapping:
        addresses:
          type: boolean
          label: 'Address lookup'
        collections:
          type: boolean
          label: 'Bin collections'
        councillors:
          type: boolean
          label: 'Councillors'
        meetings:
          type: boolean
          label: 'Council meetings'
        planning:
          type: boolean
          label: 'Planning applications'
        planning_constraints:
          type: boolean
          label: 'Planning constraints'
        events:
          type: boolean
          label: 'Local events'
        democracy:
          type: boolean
          label: 'Democracy Club'
        localisation:
          type: boolean
          label: 'Combined localisation'
