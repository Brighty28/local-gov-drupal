name: local-gov-drupal
type: drupal
docroot: web
php_version: "8.3"
webserver_type: nginx-fpm
database:
  type: mariadb
  version: "10.11"
nodejs_version: "18"
composer_version: "2"
web_environment:
  - DRUPAL_INSTALL_PROFILE=localgov

hooks:
  post-start:
    - exec: "[ -f /var/www/html/vendor/autoload.php ] || composer install"
